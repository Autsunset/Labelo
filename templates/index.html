<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labelo - YOLO标签工具集</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-hover: #30363d;
            --bg-active: #262c37;
            --border-color: #30363d;
            --border-hover: #484f58;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-primary: #a371f7;
            --accent-secondary: #8957e5;
            --accent-gradient: linear-gradient(135deg, #a371f7 0%, #8957e5 100%);
            --accent-glow: rgba(163, 113, 247, 0.2);
            --success: #3fb950;
            --error: #f85149;
            --warning: #d29922;
            --info: #58a6ff;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.24);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1), 0 2px 4px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1), 0 4px 6px rgba(0, 0, 0, 0.05);
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.35s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 0;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: all var(--transition-normal);
        }
        
        .sidebar:hover {
            box-shadow: var(--shadow-md);
        }
        
        .logo {
            padding: 24px 24px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
            transition: all var(--transition-normal);
        }
        
        .logo-icon:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px var(--accent-glow);
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        
        .logo-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
        }
        
        .sidebar-section {
            margin-bottom: 16px;
        }
        
        .sidebar-section-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.75px;
            padding: 8px 16px 6px;
            margin-bottom: 4px;
        }
        
        .sidebar-item {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .sidebar-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent-primary);
            transform: scaleY(0);
            transition: transform var(--transition-fast);
            transform-origin: center;
        }
        
        .sidebar-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .sidebar-item.active {
            background: rgba(163, 113, 247, 0.1);
            color: var(--accent-primary);
        }
        
        .sidebar-item.active::before {
            transform: scaleY(1);
        }
        
        .sidebar-item-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .sidebar-item-text {
            flex: 1;
        }
        
        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding: 16px;
            background: var(--bg-secondary);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .user-email {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .main-content {
            margin-left: 280px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 999;
            backdrop-filter: blur(10px);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        
        .header-nav {
            display: flex;
            gap: 16px;
        }
        
        .nav-item {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .nav-item.active {
            background: var(--bg-tertiary);
            color: var(--accent-primary);
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-input {
            padding: 8px 12px 8px 32px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
            width: 240px;
            transition: all var(--transition-fast);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
            width: 300px;
        }
        
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .content-area {
            flex: 1;
            padding: 40px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }
        
        .page-header {
            margin-bottom: 40px;
            text-align: center;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.03em;
        }
        
        .page-description {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-normal);
        }
        
        .form-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group:last-child {
            margin-bottom: 0;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .form-label::after {
            content: '*';
            color: var(--error);
            font-size: 12px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition-fast);
            position: relative;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .form-input::placeholder {
            color: var(--text-muted);
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        
        .input-group .form-input {
            flex: 1;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left var(--transition-slow);
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--accent-glow);
        }
        
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-secondary:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
        }
        
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }
        
        .btn-ghost:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn-full {
            width: 100%;
            padding: 14px;
            font-size: 15px;
        }
        
        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: none;
            box-shadow: var(--shadow-sm);
            margin-top: 24px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-card.show {
            display: block;
        }
        
        .result-card.success {
            border-color: var(--success);
            background: rgba(63, 185, 80, 0.05);
        }
        
        .result-card.error {
            border-color: var(--error);
            background: rgba(248, 81, 73, 0.05);
        }
        
        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .result-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .result-card.success .result-icon {
            background: rgba(63, 185, 80, 0.15);
            color: var(--success);
        }
        
        .result-card.error .result-icon {
            background: rgba(248, 81, 73, 0.15);
            color: var(--error);
        }
        
        .result-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .result-card.success .result-title {
            color: var(--success);
        }
        
        .result-card.error .result-title {
            color: var(--error);
        }
        
        .result-content {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 16px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid var(--border-color);
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 17, 23, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .loading-content {
            text-align: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            min-width: 300px;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
        }
        
        .file-explorer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 17, 23, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .file-explorer.show {
            display: flex;
        }
        
        .explorer-modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 600px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .explorer-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .explorer-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .explorer-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }
        
        .explorer-close:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .explorer-path {
            padding: 12px 24px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'SF Mono', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .explorer-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            max-height: 500px;
        }
        
        .explorer-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            color: var(--text-secondary);
            gap: 12px;
            position: relative;
        }
        
        .explorer-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .explorer-item.selected {
            background: rgba(163, 113, 247, 0.15);
            color: var(--accent-primary);
        }
        
        .explorer-icon {
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .explorer-item-name {
            flex: 1;
            font-size: 13px;
        }
        
        .explorer-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
            border: 1px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        
        .empty-text {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.6;
        }
        
        .empty-actions {
            margin-top: 32px;
            display: flex;
            gap: 12px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-normal);
        }
        
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
            transition: background var(--transition-fast);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-hover);
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            
            .main-content {
                margin-left: 240px;
            }
            
            .content-area {
                padding: 24px;
            }
            
            .header {
                padding: 16px 20px;
            }
            
            .header-title {
                font-size: 18px;
            }
            
            .form-card {
                padding: 24px;
            }
        }
        
        .animate-in {
            animation: fadeInUp 0.4s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">L</div>
            <div>
                <div class="logo-text">Labelo</div>
                <div class="logo-subtitle">YOLO标签工具集</div>
            </div>
        </div>
        
        <div class="sidebar-content" id="sidebarContent"></div>
        

    </aside>
    
    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <div class="header-title" id="headerTitle">YOLO标签工具集</div>
                <nav class="header-nav">
                    <div class="nav-item active">工具</div>
                    <div class="nav-item">文档</div>
                </nav>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="搜索功能...">
                </div>
                <button class="btn btn-ghost" id="themeToggle" onclick="toggleTheme()">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>
        </header>
        
        <div class="content-area" id="contentArea">
            <div class="empty-state">
                <div class="empty-icon">⚡</div>
                <div class="empty-title">欢迎使用 Labelo</div>
                <div class="empty-text">从左侧菜单选择一个工具开始处理您的 YOLO 标签和图像</div>
                <div class="empty-actions">
                    <button class="btn btn-primary" onclick="scrollToTools()">浏览工具</button>
                    <button class="btn btn-secondary" onclick="showDocumentation()">查看文档</button>
                </div>
            </div>
        </div>
    </main>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">正在处理中...</div>
        </div>
    </div>
    
    <div class="file-explorer" id="fileExplorer">
        <div class="explorer-modal">
            <div class="explorer-header">
                <span class="explorer-title">选择文件夹</span>
                <button class="explorer-close" onclick="closeExplorer()">×</button>
            </div>
            <div class="explorer-path" id="explorerPath"></div>
            <div class="explorer-list" id="explorerList"></div>
            <div class="explorer-footer">
                <button class="btn btn-secondary" onclick="closeExplorer()">取消</button>
                <button class="btn btn-primary" onclick="confirmPath()">确认</button>
            </div>
        </div>
    </div>

    <script>
        const functionsData = {{ functions | tojson }};
        let currentFunction = null;
        let currentField = null;
        let selectedPath = '';
        
        const categoryIcons = {
            '图像处理': '🖼️',
            '视频处理': '🎬',
            '标签处理': '🏷️',
            '数据管理': '📁',
            '其他功能': '✨'
        };
        
        function renderSidebar() {
            const container = document.getElementById('sidebarContent');
            container.innerHTML = '';
            
            for (const [category, funcs] of Object.entries(functionsData)) {
                const section = document.createElement('div');
                section.className = 'sidebar-section';
                
                const title = document.createElement('div');
                title.className = 'sidebar-section-title';
                title.textContent = category;
                section.appendChild(title);
                
                for (const [funcName, funcInfo] of Object.entries(funcs)) {
                    const item = document.createElement('div');
                    item.className = 'sidebar-item';
                    item.dataset.func = funcName;
                    item.dataset.category = category;
                    item.innerHTML = `
                        <span class="sidebar-item-icon">${categoryIcons[category] || '📄'}</span>
                        <span class="sidebar-item-text">${funcName}</span>
                    `;
                    item.onclick = () => selectFunction(category, funcName, funcInfo, item);
                    section.appendChild(item);
                }
                
                container.appendChild(section);
            }
        }
        
        function selectFunction(category, funcName, funcInfo, element) {
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            currentFunction = { name: funcName, info: funcInfo, category: category };
            
            document.getElementById('headerTitle').textContent = funcName;
            
            const content = document.getElementById('contentArea');
            
            let fieldsHtml = '';
            if (funcInfo.fields && funcInfo.fields.length > 0) {
                fieldsHtml = funcInfo.fields.map(field => `
                    <div class="form-group">
                        <label class="form-label">${field.label}</label>
                        <div class="input-group">
                            <input type="${field.type === 'number' ? 'number' : 'text'}" 
                                   id="field_${field.name}" 
                                   class="form-input"
                                   value="${field.default || ''}"
                                   placeholder="输入 ${field.label}">
                            ${field.type === 'folder' || field.type === 'file' ? 
                                `<button type="button" class="btn btn-secondary" onclick="browsePath('${field.name}')">
                                    <span>📁</span>
                                    浏览
                                </button>` : ''}
                        </div>
                    </div>
                `).join('');
            }
            
            content.innerHTML = `
                <div class="page-header animate-in">
                    <h1 class="page-title">${funcName}</h1>
                    <p class="page-description">${funcInfo.desc}</p>
                </div>
                
                <form onsubmit="executeFunction(event)">
                    <div class="form-card animate-in">
                        ${fieldsHtml}
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full" id="executeBtn">
                        <span>🚀</span>
                        开始执行
                    </button>
                </form>
                
                <div class="result-card" id="resultCard">
                    <div class="result-header">
                        <div class="result-icon" id="resultIcon"></div>
                        <div class="result-title" id="resultTitle"></div>
                    </div>
                    <div class="result-content" id="resultContent"></div>
                </div>
            `;
        }
        
        function browsePath(fieldName) {
            currentField = fieldName;
            selectedPath = '';
            loadExplorer('C:\\\\');
        }
        
        function loadExplorer(path) {
            fetch('/api/browse', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({path: path})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('explorerPath').textContent = data.current_path;
                    
                    const list = document.getElementById('explorerList');
                    list.innerHTML = '';
                    
                    if (path && path !== 'C:\\') {
                        const parentPath = data.current_path.split('\\').slice(0, -1).join('\\') || 'C:\\';
                        const parentItem = document.createElement('div');
                        parentItem.className = 'explorer-item';
                        parentItem.innerHTML = `
                            <span class="explorer-icon">📁</span>
                            <span class="explorer-item-name">..</span>
                        `;
                        parentItem.onclick = () => loadExplorer(parentPath || 'C:\\');
                        list.appendChild(parentItem);
                    }
                    
                    data.items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'explorer-item';
                        if (item.type === 'folder') {
                            div.innerHTML = `
                                <span class="explorer-icon">📁</span>
                                <span class="explorer-item-name">${item.name}</span>
                            `;
                            div.onclick = () => loadExplorer(item.path);
                        } else {
                            div.innerHTML = `
                                <span class="explorer-icon">📄</span>
                                <span class="explorer-item-name">${item.name}</span>
                            `;
                            div.onclick = () => {
                                selectedPath = item.path;
                                document.querySelectorAll('.explorer-item').forEach(i => i.classList.remove('selected'));
                                div.classList.add('selected');
                            };
                        }
                        list.appendChild(div);
                    });
                    
                    document.getElementById('fileExplorer').classList.add('show');
                } else {
                    alert('无法访问该路径: ' + data.error);
                }
            })
            .catch(err => alert('请求失败: ' + err));
        }
        
        function closeExplorer() {
            document.getElementById('fileExplorer').classList.remove('show');
        }
        
        function confirmPath() {
            if (currentField) {
                if (currentField === 'temp_dir') {
                    // 处理设置页面的临时目录
                    if (selectedPath) {
                        document.getElementById('settingTempDir').value = selectedPath;
                    }
                } else {
                    // 处理工具表单的字段
                    const currentValue = document.getElementById(`field_${currentField}`).value;
                    if (!selectedPath && currentValue) {
                        selectedPath = currentValue;
                    }
                    
                    if (selectedPath) {
                        document.getElementById(`field_${currentField}`).value = selectedPath;
                    }
                }
            }
            closeExplorer();
        }
        
        function executeFunction(e) {
            e.preventDefault();
            
            if (!currentFunction) return;
            
            const btn = document.getElementById('executeBtn');
            const loading = document.getElementById('loadingOverlay');
            const resultCard = document.getElementById('resultCard');
            
            const params = {};
            currentFunction.info.fields.forEach(field => {
                const input = document.getElementById(`field_${field.name}`);
                if (input) {
                    params[field.name] = input.value;
                }
            });
            
            btn.disabled = true;
            loading.classList.add('show');
            resultCard.className = 'result-card';
            resultCard.style.display = 'none';
            
            fetch('/api/execute', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: currentFunction.info.action,
                    params: params
                })
            })
            .then(res => res.json())
            .then(data => {
                loading.classList.remove('show');
                btn.disabled = false;
                
                resultCard.style.display = 'block';
                if (data.success) {
                    resultCard.className = 'result-card show success';
                    document.getElementById('resultIcon').textContent = '✓';
                    document.getElementById('resultTitle').textContent = '执行成功';
                    document.getElementById('resultContent').textContent = data.result || '操作已完成';
                } else {
                    resultCard.className = 'result-card show error';
                    document.getElementById('resultIcon').textContent = '✕';
                    document.getElementById('resultTitle').textContent = '执行失败';
                    document.getElementById('resultContent').textContent = data.error + '\n\n' + (data.trace || '');
                }
            })
            .catch(err => {
                loading.classList.remove('show');
                btn.disabled = false;
                resultCard.style.display = 'block';
                resultCard.className = 'result-card show error';
                document.getElementById('resultIcon').textContent = '✕';
                document.getElementById('resultTitle').textContent = '请求失败';
                document.getElementById('resultContent').textContent = err.message;
            });
        }
        
        // 搜索功能
        document.querySelector('.search-input').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.sidebar-item');
            
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (text.includes(searchTerm)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });
        
        renderSidebar();
        
        // 导航功能
        function scrollToTools() {
            document.querySelector('.sidebar').scrollIntoView({ behavior: 'smooth' });
        }
        
        function showDocumentation() {
            document.getElementById('headerTitle').textContent = '文档';
            document.getElementById('contentArea').innerHTML = `
                <div class="page-header animate-in">
                    <h1 class="page-title">使用文档</h1>
                    <p class="page-description">Labelo YOLO标签工具集使用指南</p>
                </div>
                
                <div class="form-card animate-in">
                    <h2 style="margin-bottom: 24px; color: var(--text-primary);">工具列表</h2>
                    <div style="space-y: 16px;">
                        <div style="margin-bottom: 20px;">
                            <h3 style="color: var(--accent-primary); margin-bottom: 8px;">图像处理</h3>
                            <ul style="list-style: none; padding-left: 20px;">
                                <li style="margin-bottom: 8px;">• 图片裁剪 - 裁切掉图像下半部分</li>
                                <li style="margin-bottom: 8px;">• 图片分割 - 将1536x1024图片分割成1536x150的图片</li>
                                <li style="margin-bottom: 8px;">• 移除重复图像 - 移除文件夹中的重复图像</li>
                                <li style="margin-bottom: 8px;">• 按时间戳采样图像 - 根据时间戳采样图像</li>
                            </ul>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <h3 style="color: var(--accent-primary); margin-bottom: 8px;">视频处理</h3>
                            <ul style="list-style: none; padding-left: 20px;">
                                <li style="margin-bottom: 8px;">• 从视频提取帧 - 从视频提取图像帧</li>
                                <li style="margin-bottom: 8px;">• 视频转图像 - 将视频文件转换为图像序列</li>
                            </ul>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <h3 style="color: var(--accent-primary); margin-bottom: 8px;">标签处理</h3>
                            <ul style="list-style: none; padding-left: 20px;">
                                <li style="margin-bottom: 8px;">• 检查标签类别 - 检查标签文件中的类别分布</li>
                                <li style="margin-bottom: 8px;">• 检查正方形标签 - 检查边界框是否近似正方形</li>
                                <li style="margin-bottom: 8px;">• 检查标签数量 - 检查标签文件中的标签数量</li>
                                <li style="margin-bottom: 8px;">• 检查标签和类别 - 检查标签和类别数量</li>
                                <li style="margin-bottom: 8px;">• 查找无标签图像 - 查找无对应标签的图像</li>
                                <li style="margin-bottom: 8px;">• 查找多余标签 - 查找无对应图像的标签</li>
                                <li style="margin-bottom: 8px;">• 删除无标签图像 - 删除无对应标签的图像</li>
                                <li style="margin-bottom: 8px;">• VOC转YOLO - VOC格式转YOLO格式</li>
                                <li style="margin-bottom: 8px;">• Labelme转YOLO - Labelme格式转YOLO格式</li>
                            </ul>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <h3 style="color: var(--accent-primary); margin-bottom: 8px;">数据管理</h3>
                            <ul style="list-style: none; padding-left: 20px;">
                                <li style="margin-bottom: 8px;">• 分配标签 - 分配文件到多个文件夹</li>
                                <li style="margin-bottom: 8px;">• 按标签分离图像 - 按标签分离图像到不同文件夹</li>
                                <li style="margin-bottom: 8px;">• 移动图像到文件夹 - 移动图像到指定文件夹</li>
                                <li style="margin-bottom: 8px;">• 划分 - 划分数据集</li>
                            </ul>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <h3 style="color: var(--accent-primary); margin-bottom: 8px;">其他功能</h3>
                            <ul style="list-style: none; padding-left: 20px;">
                                <li style="margin-bottom: 8px;">• 数据增强 - 图像和标签数据增强</li>
                                <li style="margin-bottom: 8px;">• 负样本txt - 处理负样本txt文件</li>
                            </ul>
                        </div>
                    </div>
                </div>
                
                <div class="form-card animate-in">
                    <h2 style="margin-bottom: 24px; color: var(--text-primary);">使用说明</h2>
                    <p style="margin-bottom: 16px; color: var(--text-secondary);">1. 从左侧菜单选择需要的工具</p>
                    <p style="margin-bottom: 16px; color: var(--text-secondary);">2. 填写工具所需的参数</p>
                    <p style="margin-bottom: 16px; color: var(--text-secondary);">3. 点击"开始执行"按钮</p>
                    <p style="margin-bottom: 16px; color: var(--text-secondary);">4. 查看执行结果</p>
                </div>
            `;
        }
        
        // 头部导航点击事件
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                const text = this.textContent.trim();
                if (text === '工具') {
                    // 显示工具页面
                    document.getElementById('headerTitle').textContent = 'YOLO标签工具集';
                    document.getElementById('contentArea').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">⚡</div>
                            <div class="empty-title">欢迎使用 Labelo</div>
                            <div class="empty-text">从左侧菜单选择一个工具开始处理您的 YOLO 标签和图像</div>
                            <div class="empty-actions">
                                <button class="btn btn-primary" onclick="scrollToTools()">浏览工具</button>
                                <button class="btn btn-secondary" onclick="showDocumentation()">查看文档</button>
                            </div>
                        </div>
                    `;
                } else if (text === '文档') {
                    showDocumentation();
                }
            });
        });
        
        // 主题切换功能
        function toggleTheme() {
            const currentTheme = localStorage.getItem('labeloTheme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            localStorage.setItem('labeloTheme', newTheme);
            applyTheme(newTheme);
        }
        
        function applyTheme(theme) {
            const themeIcon = document.getElementById('themeIcon');
            
            if (theme === 'light') {
                // 浅色主题
                document.documentElement.style.setProperty('--bg-primary', '#ffffff');
                document.documentElement.style.setProperty('--bg-secondary', '#f7f8fa');
                document.documentElement.style.setProperty('--bg-tertiary', '#e9ecef');
                document.documentElement.style.setProperty('--bg-hover', '#f1f3f4');
                document.documentElement.style.setProperty('--bg-active', '#e3e6e9');
                document.documentElement.style.setProperty('--text-primary', '#1a1a1a');
                document.documentElement.style.setProperty('--text-secondary', '#4a4a4a');
                document.documentElement.style.setProperty('--text-muted', '#8a8a8a');
                document.documentElement.style.setProperty('--border-color', '#dee2e6');
                document.documentElement.style.setProperty('--border-hover', '#ced4da');
                themeIcon.textContent = '🌙';
            } else {
                // 深色主题
                document.documentElement.style.setProperty('--bg-primary', '#0d1117');
                document.documentElement.style.setProperty('--bg-secondary', '#161b22');
                document.documentElement.style.setProperty('--bg-tertiary', '#21262d');
                document.documentElement.style.setProperty('--bg-hover', '#30363d');
                document.documentElement.style.setProperty('--bg-active', '#262c37');
                document.documentElement.style.setProperty('--text-primary', '#e6edf3');
                document.documentElement.style.setProperty('--text-secondary', '#8b949e');
                document.documentElement.style.setProperty('--text-muted', '#6e7681');
                document.documentElement.style.setProperty('--border-color', '#30363d');
                document.documentElement.style.setProperty('--border-hover', '#484f58');
                themeIcon.textContent = '☀️';
            }
        }
        
        // 初始化主题
        window.addEventListener('load', function() {
            const savedTheme = localStorage.getItem('labeloTheme') || 'dark';
            applyTheme(savedTheme);
        });
    </script>
</body>
</html>
